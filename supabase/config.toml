# Конфиг Supabase CLI. Проект PanditJi (общий), таблицы «Поздравлятора» — с префиксом pzd_.
project_id = "intcymsjpbkyrflfcwzf"

# Эндпоинт авторизации вызывается до входа (анонимно) и сам проверяет
# подпись Telegram, поэтому проверку пользовательского JWT отключаем.
[functions.telegram-auth]
verify_jwt = false

# Крон-рассылка напоминаний — защищена секретным заголовком x-cron-secret.
[functions.pzd-reminders]
verify_jwt = false

# Telegram-вебхук — защищён секретным заголовком, Telegram не шлёт JWT.
[functions.pzd-bot]
verify_jwt = false
